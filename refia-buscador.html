<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>REFIA — Buscador</title>
  <style>
    :root{
      --blue:#003366;--blue-lt:#0A4D8C;--gold:#C9A15A;
      --ivory:#F7F5EF;--graph:#253138;--muted:#64748b;
      --border:#e2e8f0;--green:#16a34a;--teal:#0f766e;
      --g1:#f0eeea;--g2:#e2dfd8;--g4:#9b9890;--g6:#6b6864;
      --green-bg:#f0fdf4;--amber:#b06a00;--amber-bg:#fff8ec;
      --red:#dc2626;--red-bg:#fdf2f1;
      --radius:12px;--shadow:0 2px 12px rgba(0,0,0,.08);
      --shadow-md:0 4px 24px rgba(0,0,0,.12);
    }
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:var(--ivory);color:var(--graph);min-height:100vh}

    /* HEADER */
    .hdr{background:var(--blue);padding:14px 20px 0;position:sticky;top:0;z-index:50;box-shadow:0 2px 16px rgba(0,0,0,.25)}
    .hdr-top{display:flex;align-items:center;margin-bottom:14px}
    .logo{font-size:24px;font-weight:700;color:#fff;letter-spacing:-.5px}
    .logo span{color:var(--gold)}
    .logo-sub{font-size:10px;color:rgba(255,255,255,.4);text-transform:uppercase;letter-spacing:1px;margin-left:3px;align-self:flex-end;margin-bottom:4px}
    .hdr-badge{margin-left:auto;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.15);color:rgba(255,255,255,.6);font-size:11px;padding:4px 12px;border-radius:20px}
    .sw{position:relative;margin-bottom:-1px}
    .si{width:100%;padding:13px 44px;border:2px solid transparent;border-radius:12px 12px 0 0;font-size:16px;font-family:inherit;background:#fff;color:var(--graph);outline:none;transition:border-color .15s}
    .si:focus{border-color:var(--gold)}
    .si::placeholder{color:var(--g4)}
    .sicon{position:absolute;left:15px;top:50%;transform:translateY(-50%);font-size:17px;pointer-events:none;opacity:.4}
    .sclear{position:absolute;right:14px;top:50%;transform:translateY(-50%);background:var(--g2);border:none;color:var(--g6);width:22px;height:22px;border-radius:50%;cursor:pointer;font-size:12px;font-weight:700;display:none;align-items:center;justify-content:center}
    .sclear.vis{display:flex}

    /* FILTERS */
    .fb{background:#fff;border-bottom:1px solid var(--border);overflow-x:auto;scrollbar-width:none;padding:10px 16px;display:flex;gap:7px;align-items:center;white-space:nowrap}
    .fb::-webkit-scrollbar{display:none}
    .chip{display:inline-flex;align-items:center;gap:4px;padding:5px 13px;border-radius:20px;font-size:12.5px;font-weight:500;cursor:pointer;border:1.5px solid var(--border);background:#fff;color:var(--g6);transition:all .12s;user-select:none}
    .chip:hover{border-color:var(--blue);color:var(--blue)}
    .chip.on{background:var(--blue);border-color:var(--blue);color:#fff}
    .cc{font-size:10.5px;background:rgba(0,0,0,.08);border-radius:10px;padding:0 5px}
    .chip.on .cc{background:rgba(255,255,255,.2)}
    .sep{width:1px;height:20px;background:var(--border);margin:0 2px;flex-shrink:0}

    /* TOOLBAR */
    .tb{padding:10px 18px 6px;display:flex;align-items:center;justify-content:space-between;gap:8px}
    .rl{font-size:13px;color:var(--muted)}
    .rl strong{color:var(--graph);font-weight:600}
    .ss{font-size:12px;font-family:inherit;border:1.5px solid var(--border);background:#fff;color:var(--muted);padding:5px 10px;border-radius:8px;outline:none;cursor:pointer}

    /* GRID */
    .grid{padding:4px 14px 28px;display:grid;grid-template-columns:1fr;gap:10px}
    @media(min-width:560px){.grid{grid-template-columns:repeat(2,1fr)}}
    @media(min-width:860px){.grid{grid-template-columns:repeat(3,1fr)}}

    /* RESULT CARD (compact, clickable) */
    .card{background:#fff;border:1.5px solid var(--border);border-radius:14px;padding:14px 15px;display:flex;align-items:center;gap:13px;cursor:pointer;transition:border-color .15s,box-shadow .15s,transform .12s}
    .card:hover{border-color:var(--blue);box-shadow:var(--shadow-md);transform:translateY(-2px)}
    .card-thumb{width:64px;height:64px;object-fit:contain;border-radius:8px;background:var(--g1);flex-shrink:0}
    .card-thumb-ph{width:64px;height:64px;border-radius:8px;background:var(--g1);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:22px;color:var(--g4)}
    .card-body{flex:1;min-width:0}
    .card-cat{font-size:10px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;color:var(--muted);margin-bottom:3px}
    .card-name{font-size:13.5px;font-weight:700;color:var(--graph);line-height:1.3;margin-bottom:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .card-oem{font-size:11px;font-weight:600;color:var(--teal);font-family:'Courier New',monospace}
    .card-right{display:flex;flex-direction:column;align-items:flex-end;gap:5px;flex-shrink:0}
    .card-price{font-size:16px;font-weight:700;color:var(--blue);white-space:nowrap}
    .card-stock{font-size:11px;font-weight:600;padding:3px 9px;border-radius:20px;white-space:nowrap}
    .sok{background:var(--green-bg);color:var(--green)}
    .slow{background:var(--amber-bg);color:var(--amber)}
    .sout{background:var(--red-bg);color:var(--red)}

    /* HIGHLIGHT */
    mark{background:#fff0b3;color:inherit;border-radius:2px;padding:0 1px}

    /* EMPTY */
    .empty{grid-column:1/-1;text-align:center;padding:56px 20px;color:var(--g4)}
    .empty .ei{font-size:44px;margin-bottom:12px}
    .empty h3{font-size:15px;color:var(--g6);margin-bottom:6px}
    .empty p{font-size:13px}

    /* ══════════ MODAL ══════════ */
    .overlay{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:200;display:none;align-items:center;justify-content:center;padding:16px;backdrop-filter:blur(3px)}
    .overlay.open{display:flex}

    .modal{background:#fff;border-radius:16px;width:100%;max-width:720px;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.3);display:flex;flex-direction:column;animation:slideUp .25s ease}
    @keyframes slideUp{from{transform:translateY(20px);opacity:0}to{transform:translateY(0);opacity:1}}

    /* Modal header */
    .mh{background:var(--blue);padding:14px 20px;display:flex;align-items:center;justify-content:space-between;border-radius:16px 16px 0 0;flex-shrink:0}
    .mh-left{display:flex;align-items:center;gap:10px}
    .mh-cat{font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:rgba(255,255,255,.6);background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);padding:3px 9px;border-radius:4px}
    .mh-fuente{font-size:10px;color:rgba(255,255,255,.4)}
    .mh-close{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);color:#fff;width:30px;height:30px;border-radius:50%;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;transition:background .15s}
    .mh-close:hover{background:rgba(255,255,255,.25)}

    /* Modal body */
    .mb{display:grid;grid-template-columns:200px 1fr}
    @media(max-width:580px){.mb{grid-template-columns:1fr}}

    /* Photo panel */
    .mp{background:#f8fafc;border-right:1px solid var(--border);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px 20px;gap:12px}
    @media(max-width:580px){.mp{border-right:none;border-bottom:1px solid var(--border);padding:20px}}
    .mp-img{width:160px;height:160px;object-fit:contain;border-radius:10px}
    .mp-ph{width:160px;height:160px;border-radius:10px;background:var(--g1);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;color:var(--g4)}
    .mp-ph-icon{font-size:40px}
    .mp-ph-txt{font-size:11px;color:var(--g4);text-align:center;line-height:1.4}
    .mp-sku{font-family:'Courier New',monospace;font-size:11px;color:var(--muted);background:var(--g1);border:1px solid var(--border);padding:4px 10px;border-radius:6px;text-align:center;word-break:break-all}

    /* Detail panel */
    .md{padding:20px 22px;display:flex;flex-direction:column;gap:14px}
    .md-name{font-size:18px;font-weight:700;color:var(--graph);line-height:1.25}
    .md-sub{font-size:12px;color:var(--muted);margin-top:3px}

    /* SKU / OEM transform box */
    .sku-box{background:#f8fafc;border:1px solid var(--border);border-radius:8px;padding:11px 14px;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
    .sku-col{display:flex;flex-direction:column;gap:2px}
    .sku-lbl{font-size:10px;font-weight:700;letter-spacing:.6px;text-transform:uppercase;color:var(--muted)}
    .sku-val{font-family:'Courier New',monospace;font-size:14px;font-weight:700;color:var(--graph)}
    .sku-arrow{font-size:18px;color:var(--teal);flex-shrink:0}
    .oem-lbl{color:var(--teal)}
    .oem-val{color:var(--teal)}

    /* Compat chips */
    .compat-section{}
    .compat-head{font-size:10px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;color:var(--muted);margin-bottom:7px}
    .compat-chips{display:flex;flex-wrap:wrap;gap:6px}
    .compat-chip{font-size:11px;font-weight:500;color:var(--blue);background:rgba(0,51,102,.06);border:1px solid rgba(0,51,102,.15);border-radius:20px;padding:4px 11px}

    /* Price section */
    .price-section{background:var(--blue);border-radius:10px;overflow:hidden}
    .price-hdr{padding:10px 16px;display:flex;align-items:center;justify-content:space-between}
    .price-title{font-size:11px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;color:rgba(255,255,255,.6)}
    .price-badge{font-size:10px;color:var(--gold);background:rgba(201,161,90,.12);border:1px solid rgba(201,161,90,.3);border-radius:4px;padding:2px 8px;font-weight:600}
    .price-table{width:100%;border-collapse:collapse}
    .price-table tr{border-top:1px solid rgba(255,255,255,.08)}
    .price-table td{padding:9px 16px;font-size:13px;color:rgba(255,255,255,.7)}
    .price-table td:first-child{font-weight:500}
    .price-table td:last-child{text-align:right;font-weight:700;font-size:15px;color:#fff}
    .price-piso td{background:rgba(255,255,255,.06)}
    .price-piso td:last-child{color:var(--gold) !important}
    .price-margen td:last-child{color:#86efac !important}

    /* Modal footer */
    .mf{background:#f8fafc;border-top:1px solid var(--border);padding:14px 22px;display:flex;align-items:center;justify-content:space-between;gap:12px;flex-shrink:0;border-radius:0 0 16px 16px;flex-wrap:wrap}
    .mf-note{font-size:11px;color:var(--muted)}
    .btn-wa{display:inline-flex;align-items:center;gap:7px;background:#25D366;color:#fff;border:none;border-radius:8px;padding:10px 20px;font-size:13px;font-weight:700;font-family:inherit;cursor:pointer;text-decoration:none;transition:background .15s}
    .btn-wa:hover{background:#1da851}
    .btn-close-sec{background:transparent;color:var(--blue);border:1.5px solid rgba(0,51,102,.3);border-radius:8px;font-family:inherit;font-size:13px;font-weight:600;padding:10px 18px;cursor:pointer;transition:background .15s}
    .btn-close-sec:hover{background:rgba(0,51,102,.06)}
  </style>
</head>

function sCls(e){return e===0?'sout':e<=2?'slow':'sok';}
function sTxt(e){return e===0?'Sin stock':e===1?'1 und.':e===2?'2 und.':e+' und.';}
function hl(t,toks){if(!toks.length)return t;var re=new RegExp('('+toks.map(function(x){return x.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');}).join('|')+')','gi');return t.replace(re,'<mark>$1</mark>');}
function wa(item){var msg='*'+item.d+'*\nSKU: '+item.sku+(item.oem?'\nRef. OEM: '+item.oem:'')+'\nDisponibilidad: '+item.e+' unidad(es)\n\n_Don Repuestos - cotización con RefIA_';return'https://wa.me/573000000000?text='+encodeURIComponent(msg);}

/* ── FILTERS ── */
function buildFB(){
  var fuentes=['all','Importación','Bodega P3'],flbl={all:'Todos','Importación':'Importación','Bodega P3':'Bodega P3'};
  var h=fuentes.map(function(f){var n=f==='all'?P.length:P.filter(function(x){return x.f===f;}).length;return'<div class="chip '+(aF===f?'on':'')+'" onclick="setF(\''+f+'\')">'+flbl[f]+' <span class="cc">'+n+'</span></div>';}).join('');
  h+='<div class="sep"></div>';
  var cats={};P.forEach(function(x){cats[x.c]=(cats[x.c]||0)+1;});
  h+='<div class="chip '+(aC==='all'?'on':'')+'" onclick="setC(\'all\')">Todas <span class="cc">'+P.length+'</span></div>';
  Object.entries(cats).sort(function(a,b){return b[1]-a[1];}).forEach(function(e){var c=e[0],n=e[1];h+='<div class="chip '+(aC===c?'on':'')+'" onclick="setC(\''+c.replace(/'/g,"\\'")+'\')">'+c+' <span class="cc">'+n+'</span></div>';});
  document.getElementById('fb').innerHTML=h;
}
function setF(f){aF=f;buildFB();render();}
function setC(c){aC=c;buildFB();render();}

/* ── RENDER LIST ── */
function render(){
  var q=document.getElementById('q').value.trim();
  var toks=norm(q).split(/\s+/).filter(function(t){return t.length>1;});
  document.getElementById('clr').classList.toggle('vis',q.length>0);
  var res=P.filter(function(item){
    if(aF!=='all'&&item.f!==aF)return false;
    if(aC!=='all'&&item.c!==aC)return false;
    if(!toks.length)return true;
    return toks.every(function(t){return norm(item.d+' '+item.oem+' '+item.c+' '+item.sku).indexOf(t)>=0;});
  });
  var srt=document.getElementById('srt').value;
  if(srt==='pa')res.sort(function(a,b){return a.p-b.p;});
  else if(srt==='pd')res.sort(function(a,b){return b.p-a.p;});
  else if(srt==='st')res.sort(function(a,b){return b.e-a.e;});
  document.getElementById('rl').innerHTML=res.length?'<strong>'+res.length+'</strong> producto'+(res.length!==1?'s':'')+' — toca para ver detalle':'Sin resultados';
  var grid=document.getElementById('grid');
  if(!res.length){grid.innerHTML='<div class="empty"><div class="ei">&#128270;</div><h3>Sin resultados para "'+q+'"</h3><p>Prueba con el vehículo, categoría o código OEM</p></div>';return;}
  grid.innerHTML=res.map(function(item,i){
    var dh=hl(item.d,toks),oh=item.oem?hl(item.oem,toks):'';
    var thumb=item.foto
      ?'<img class="card-thumb" src="'+item.foto+'" onerror="this.outerHTML=\'<div class=card-thumb-ph>&#128269;</div>\'">'
      :'<div class="card-thumb-ph">'+catIcon(item.c)+'</div>';
    return '<div class="card" onclick="openModal('+item._idx+')">'
      +thumb
      +'<div class="card-body">'
        +'<div class="card-cat">'+item.c+'</div>'
        +'<div class="card-name">'+dh+'</div>'
        +(item.oem?'<div class="card-oem">'+oh+'</div>':'')
      +'</div>'
      +'<div class="card-right">'
        +'<div class="card-price">'+fmt(item.p)+'</div>'
        +'<span class="card-stock '+sCls(item.e)+'">'+sTxt(item.e)+'</span>'
      +'</div>'
    +'</div>';
  }).join('');
}

/* ── CATEGORY ICONS ── */
function catIcon(c){
  var icons={'Amortiguadores':'&#128664;','Bujías':'&#9889;','Bombas':'&#128722;','Suspensión':'&#128663;','Soportes Motor':'&#9881;','Alternadores':'&#9889;','Transmisión':'&#9881;','Motor':'&#9881;','Dirección':'&#9696;'};
  return icons[c]||'&#128295;';
}

/* ── MODAL ── */
function openModal(idx){
  var item=P[idx];
  if(!item)return;

  document.getElementById('m-cat').textContent=item.c;
  document.getElementById('m-fuente').textContent=item.f;
  document.getElementById('m-name').textContent=item.d;
  document.getElementById('m-sub').textContent='Don Repuestos · '+item.f;
  document.getElementById('m-sku').textContent='SKU: '+item.sku;

  // Photo or placeholder
  var fotoEl=document.getElementById('m-foto');
  if(item.foto){
    fotoEl.innerHTML='<img class="mp-img" src="'+item.foto+'" onerror="this.outerHTML=\'<div class=mp-ph><div class=mp-ph-icon>'+catIcon(item.c)+'</div><div class=mp-ph-txt>Foto próximamente</div></div>\'">';
  } else {
    fotoEl.innerHTML='<div class="mp-ph"><div class="mp-ph-icon">'+catIcon(item.c)+'</div><div class="mp-ph-txt">Foto próximamente</div></div>';
  }

  // SKU / OEM box
  var skuboxEl=document.getElementById('m-skubox');
  if(item.oem){
    skuboxEl.innerHTML='<div class="sku-col"><div class="sku-lbl">SKU Interno</div><div class="sku-val">'+item.sku+'</div></div>'
      +'<div class="sku-arrow">&#8594;</div>'
      +'<div class="sku-col"><div class="sku-lbl oem-lbl">Referencia OEM</div><div class="sku-val oem-val">'+item.oem+'</div></div>';
    skuboxEl.style.display='flex';
  } else {
    skuboxEl.innerHTML='<div class="sku-col"><div class="sku-lbl">SKU Interno</div><div class="sku-val">'+item.sku+'</div></div>';
    skuboxEl.style.display='flex';
  }

  // Compatibilities
  var compatEl=document.getElementById('m-compat');
  if(item.compat){
    var chips=item.compat.split(',').map(function(v){return'<span class="compat-chip">'+v.trim()+'</span>';}).join('');
    compatEl.innerHTML='<div class="compat-head">&#128663; Compatible con</div><div class="compat-chips">'+chips+'</div>';
    compatEl.style.display='block';
  } else {
    compatEl.innerHTML='<div class="compat-head">&#128663; Compatible con</div><div class="compat-chips"><span class="compat-chip" style="opacity:.5;font-style:italic">Ver descripción del producto</span></div>';
    compatEl.style.display='block';
  }

  // Price table
  var margen=item.co>0?Math.round((item.p-item.co)/item.p*100):null;
  var priceHtml='<tr><td>Costo</td><td>'+fmt(item.co)+'</td></tr>'
    +'<tr class="price-piso"><td>&#128274; Precio piso</td><td>'+fmt(item.p)+'</td></tr>';
  if(margen!==null) priceHtml+='<tr class="price-margen"><td>Margen mínimo</td><td>'+margen+'%</td></tr>';
  document.getElementById('m-prices').innerHTML=priceHtml;

  // Footer note + WA
  document.getElementById('m-note').textContent=item.e>0?item.e+' unidad'+(item.e!==1?'es':'')+(item.e<=2?' — ¡última'+(item.e!==1?'s':'')+'!':'')+' en bodega':'Sin stock actualmente';
  document.getElementById('m-wa').href=wa(item);

  document.getElementById('overlay').classList.add('open');
  document.body.style.overflow='hidden';
}

function closeModal(e){
  if(e&&e.target!==document.getElementById('overlay'))return;
  document.getElementById('overlay').classList.remove('open');
  document.body.style.overflow='';
}

document.addEventListener('keydown',function(e){if(e.key==='Escape')closeModal();});

/* ── EVENTS + INIT ── */
document.getElementById('q').addEventListener('input',render);
function clearQ(){document.getElementById('q').value='';document.getElementById('q').focus();render();}

// Add index to each product for modal lookup
P.forEach(function(item,i){item._idx=i;});
document.getElementById('badge').textContent=P.length+' SKUs';
buildFB();
render();
</script>
</body>
</html>
