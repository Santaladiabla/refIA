    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:var(--ivory);color:var(--g8);min-height:100vh}
    .hdr{background:var(--blue);padding:14px 20px 0;position:sticky;top:0;z-index:50;box-shadow:0 2px 16px rgba(0,0,0,.25)}
    .hdr-top{display:flex;align-items:center;margin-bottom:14px}
    .logo{font-size:24px;font-weight:700;color:#fff;letter-spacing:-.5px}
    .logo span{color:var(--gold)}
    .logo-sub{font-size:10px;color:rgba(255,255,255,.4);text-transform:uppercase;letter-spacing:1px;margin-left:3px;align-self:flex-end;margin-bottom:4px}
    .hdr-badge{margin-left:auto;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.15);color:rgba(255,255,255,.6);font-size:11px;padding:4px 12px;border-radius:20px}
    .sw{position:relative;margin-bottom:-1px}
    .si{width:100%;padding:13px 44px;border:2px solid transparent;border-radius:12px 12px 0 0;font-size:16px;font-family:inherit;background:#fff;color:var(--g8);outline:none;transition:border-color .15s}
    .si:focus{border-color:var(--gold)}
    .si::placeholder{color:var(--g4)}
    .sicon{position:absolute;left:15px;top:50%;transform:translateY(-50%);font-size:17px;pointer-events:none;opacity:.4}
    .sclear{position:absolute;right:14px;top:50%;transform:translateY(-50%);background:var(--g2);border:none;color:var(--g6);width:22px;height:22px;border-radius:50%;cursor:pointer;font-size:12px;font-weight:700;display:none;align-items:center;justify-content:center}
    .sclear.vis{display:flex}
    .fb{background:#fff;border-bottom:1px solid var(--g2);overflow-x:auto;scrollbar-width:none;padding:10px 16px;display:flex;gap:7px;align-items:center;white-space:nowrap}
    .fb::-webkit-scrollbar{display:none}
    .chip{display:inline-flex;align-items:center;gap:4px;padding:5px 13px;border-radius:20px;font-size:12.5px;font-weight:500;cursor:pointer;border:1.5px solid var(--g2);background:#fff;color:var(--g6);transition:all .12s;user-select:none}
    .chip:hover{border-color:var(--blue);color:var(--blue)}
    .chip.on{background:var(--blue);border-color:var(--blue);color:#fff}
    .cc{font-size:10.5px;background:rgba(0,0,0,.08);border-radius:10px;padding:0 5px}
    .chip.on .cc{background:rgba(255,255,255,.2)}
    .sep{width:1px;height:20px;background:var(--g2);margin:0 2px;flex-shrink:0}
    .tb{padding:10px 18px 6px;display:flex;align-items:center;justify-content:space-between;gap:8px}
    .rl{font-size:13px;color:var(--g6)}
    .rl strong{color:var(--g8);font-weight:600}
    .ss{font-size:12px;font-family:inherit;border:1.5px solid var(--g2);background:#fff;color:var(--g6);padding:5px 10px;border-radius:8px;outline:none;cursor:pointer}
    .grid{padding:4px 14px 28px;display:grid;grid-template-columns:1fr;gap:10px}
    @media(min-width:560px){.grid{grid-template-columns:repeat(2,1fr)}}
    @media(min-width:860px){.grid{grid-template-columns:repeat(3,1fr)}}
    .card{background:#fff;border:1.5px solid var(--g2);border-radius:14px;padding:15px;display:flex;flex-direction:column;transition:border-color .12s,box-shadow .12s,transform .12s}
    .card:hover{border-color:var(--blue);box-shadow:0 4px 18px rgba(0,51,102,.1);transform:translateY(-1px)}
    .cm{display:flex;align-items:center;justify-content:space-between;margin-bottom:9px}
    .bcat{font-size:10.5px;font-weight:700;letter-spacing:.3px;text-transform:uppercase;background:var(--g1);color:var(--g6);padding:3px 8px;border-radius:6px}
    .bfue{font-size:10px;color:var(--g4)}
    .cdesc{font-size:14px;font-weight:600;color:var(--g8);line-height:1.35;margin-bottom:6px}
    .csku{font-size:11px;color:var(--g4);margin-bottom:8px}
    .coem{display:inline-flex;align-items:center;gap:4px;background:var(--gold-bg);border:1px solid var(--gold-border);color:#8a6720;font-size:11.5px;font-weight:700;padding:3px 9px;border-radius:6px;margin-bottom:6px;width:fit-content}
    .ccompat{font-size:11px;color:var(--g6);line-height:1.4;margin-bottom:8px}
    .cfoto{width:100%;max-height:140px;object-fit:contain;border-radius:8px;background:var(--g1);margin-bottom:8px;display:block}
    .csp{flex:1}
    .cfoot{display:flex;align-items:flex-end;justify-content:space-between;padding-top:11px;border-top:1px solid var(--g1);margin-top:10px;gap:8px}
    .pval{font-size:19px;font-weight:700;color:var(--blue);line-height:1}
    .plbl{font-size:10px;color:var(--g4);margin-top:2px}
    .cact{display:flex;flex-direction:column;align-items:flex-end;gap:5px}
    .sbadge{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;border-radius:20px;font-size:11.5px;font-weight:600;white-space:nowrap}
    .sok{background:var(--green-bg);color:var(--green)}
    .slow{background:var(--amber-bg);color:var(--amber)}
    .sout{background:var(--red-bg);color:var(--red)}
    .bwa{display:inline-flex;align-items:center;gap:5px;background:#25D366;color:#fff;border:none;border-radius:8px;padding:6px 11px;font-size:12px;font-weight:600;font-family:inherit;cursor:pointer;text-decoration:none;white-space:nowrap}
    .bwa:hover{background:#1eb957}
    mark{background:#fff0b3;color:inherit;border-radius:2px;padding:0 1px}
    .empty{grid-column:1/-1;text-align:center;padding:56px 20px;color:var(--g4)}
    .empty .ei{font-size:44px;margin-bottom:12px}
    .empty h3{font-size:15px;color:var(--g6);margin-bottom:6px}
    .empty p{font-size:13px}
  </style>
</head>

var aC='all',aF='all';
function norm(s){return(s||'').toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g,'').replace(/[^a-z0-9\/\s]/g,' ');}
function fmt(n){return'$'+Math.round(n).toLocaleString('es-CO');}
function sCls(e){return e===0?'sout':e<=2?'slow':'sok';}
function sTxt(e){return e===0?'Sin stock':e===1?'1 und.':e===2?'2 und.':e+' und.';}
function hl(t,toks){if(!toks.length)return t;var re=new RegExp('('+toks.map(function(x){return x.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');}).join('|')+')','gi');return t.replace(re,'<mark>$1</mark>');}
function wa(item){var msg='*'+item.d+'*\nSKU: '+item.sku+(item.oem?'\nRef. OEM: '+item.oem:'')+'\nDisponibilidad: '+item.e+' unidad(es)\n\n_Don Repuestos - cotización con RefIA_';return'https://wa.me/573000000000?text='+encodeURIComponent(msg);}
function buildFB(){
  var fuentes=['all','Importación','Bodega P3'],flbl={all:'Todos','Importación':'Importación','Bodega P3':'Bodega P3'};
  var h=fuentes.map(function(f){var n=f==='all'?P.length:P.filter(function(x){return x.f===f;}).length;return'<div class="chip '+(aF===f?'on':'')+'" onclick="setF(\''+f+'\')">'+flbl[f]+' <span class="cc">'+n+'</span></div>';}).join('');
  h+='<div class="sep"></div>';
  var cats={};P.forEach(function(x){cats[x.c]=(cats[x.c]||0)+1;});
  h+='<div class="chip '+(aC==='all'?'on':'')+'" onclick="setC(\'all\')">Todas <span class="cc">'+P.length+'</span></div>';
  Object.entries(cats).sort(function(a,b){return b[1]-a[1];}).forEach(function(e){var c=e[0],n=e[1];h+='<div class="chip '+(aC===c?'on':'')+'" onclick="setC(\''+c.replace(/'/g,"\\'")+'\')">'  +c+' <span class="cc">'+n+'</span></div>';});
  document.getElementById('fb').innerHTML=h;
}
function setF(f){aF=f;buildFB();render();}
function setC(c){aC=c;buildFB();render();}
function render(){
  var q=document.getElementById('q').value.trim();
  var toks=norm(q).split(/\s+/).filter(function(t){return t.length>1;});
  document.getElementById('clr').classList.toggle('vis',q.length>0);
  var res=P.filter(function(item){
    if(aF!=='all'&&item.f!==aF)return false;
    if(aC!=='all'&&item.c!==aC)return false;
    if(!toks.length)return true;
    var hay=norm(item.d+' '+item.oem+' '+item.c+' '+item.sku);
    return toks.every(function(t){return hay.indexOf(t)>=0;});
  });
  var srt=document.getElementById('srt').value;
  if(srt==='pa')res.sort(function(a,b){return a.p-b.p;});
  else if(srt==='pd')res.sort(function(a,b){return b.p-a.p;});
  else if(srt==='st')res.sort(function(a,b){return b.e-a.e;});
  document.getElementById('rl').innerHTML=res.length?'<strong>'+res.length+'</strong> producto'+(res.length!==1?'s':'')+' encontrado'+(res.length!==1?'s':''):'Sin resultados';
  var grid=document.getElementById('grid');
  if(!res.length){grid.innerHTML='<div class="empty"><div class="ei">&#128270;</div><h3>Sin resultados para "'+q+'"</h3><p>Prueba con el vehículo, categoría o código OEM</p></div>';return;}
  grid.innerHTML=res.map(function(item){
    var dh=hl(item.d,toks),oh=item.oem?hl(item.oem,toks):'';
    return '<div class="card"><div class="cm"><span class="bcat">'+item.c+'</span><span class="bfue">'+item.f+'</span></div>'+(item.foto?'<img class="cfoto" src="'+item.foto+'" alt="'+item.d+'" loading="lazy" onerror="this.style.display=\'none\'">'  :'')+
    '<div class="cdesc">'+dh+'</div><div class="csku">'+item.sku+'</div>'+
    (item.oem?'<div class="coem">OEM: '+oh+'</div>':'')+
    (item.compat?'<div class="ccompat">'+item.compat+'</div>':'')+
    '<div class="csp"></div><div class="cfoot"><div><div class="pval">'+fmt(item.p)+'</div><div class="plbl">precio piso</div></div>'+
    '<div class="cact"><span class="sbadge '+sCls(item.e)+'">'+sTxt(item.e)+'</span>'+
    '<a class="bwa" href="'+wa(item)+'" target="_blank">Cotizar WA</a></div></div></div>';
  }).join('');
}
document.getElementById('q').addEventListener('input',render);
function clearQ(){document.getElementById('q').value='';document.getElementById('q').focus();render();}
document.getElementById('badge').textContent=P.length+' SKUs';
